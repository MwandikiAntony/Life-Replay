version: '3.9'

services:
  # ─── Backend API ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifereplay-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/aiplatform-sa-key.json
      - PROJECT_ID=${PROJECT_ID:-warm-alliance-381015}
      - PROJECT_NUMBER=${PROJECT_NUMBER:-521107151792}
      - REGION=${REGION:-us-central1}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-live-001}
      - GEMINI_LOCATION=${GEMINI_LOCATION:-us-central1}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-(default)}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
      - WS_BASE_URL=${WS_BASE_URL:-ws://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/aiplatform-sa-key.json:/app/aiplatform-sa-key.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - lifereplay-net

  # ─── Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_BASE_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${WS_BASE_URL:-ws://localhost:8000}
    container_name: lifereplay-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_BASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${WS_BASE_URL:-ws://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lifereplay-net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lifereplay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lifereplay-net

networks:
  lifereplay-net:
    driver: bridge
